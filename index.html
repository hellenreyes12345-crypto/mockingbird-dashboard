<title>Mockingbird Tree Service — Lead Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f2f5; color: #333; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: #1B4332; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .header-right { text-align: right; }
  .header-subtitle { color: #95D5B2; font-size: 13px; font-weight: 600; }
  .header-updated { color: #95D5B2; font-size: 11px; margin-top: 2px; }

  /* STATS BAR */
  .stats-bar {
    background: #fff; border-bottom: 1px solid #e8eaed;
    padding: 12px 16px; display: flex; gap: 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .stat-card {
    flex: 0 0 auto; background: #f8f9fa; border-radius: 10px;
    padding: 10px 16px; text-align: center; min-width: 80px;
    border: 1px solid #e8eaed;
  }
  .stat-icon { font-size: 20px; }
  .stat-number { font-size: 22px; font-weight: 700; color: #1B4332; line-height: 1.1; }
  .stat-number.red { color: #C62828; }
  .stat-label { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* FILTER TABS */
  .filter-bar {
    position: sticky; top: 57px; z-index: 99;
    background: #fff; border-bottom: 1px solid #e8eaed;
    padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto;
  }
  .filter-btn {
    flex: 0 0 auto; padding: 6px 14px; border-radius: 20px;
    border: 1px solid #ddd; background: #fff; color: #555;
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn.active { background: #2D6A4F; color: #fff; border-color: #2D6A4F; }
  .filter-btn:hover:not(.active) { background: #f0f2f5; }

  /* MAIN CONTENT */
  .main { padding: 16px; max-width: 800px; margin: 0 auto; }

  /* DAY CARD */
  .day-card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 16px; overflow: hidden;
  }
  .day-header {
    padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #e8eaed;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .day-date { font-size: 16px; font-weight: 700; color: #1B4332; }
  .day-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .mini-badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
  }
  .badge-call { background: #E3F2FD; color: #1565C0; }
  .badge-form { background: #FFF3E0; color: #E65100; }
  .badge-lsa  { background: #F3E5F5; color: #6A1B9A; }

  /* ENTRY CARDS */
  .day-entries { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .entry-card { border-radius: 8px; padding: 12px 14px; border-left: 4px solid #ccc; }

  /* ACTION */
  .entry-card.action {
    background: #FFEBEE; border-left-color: #C62828;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .action-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .action-text { font-size: 14px; font-weight: 700; color: #C62828; line-height: 1.4; }

  /* CALLRAIL */
  .entry-card.call-booked   { background: #F0FFF4; border-left-color: #2D6A4F; }
  .entry-card.call-answered { background: #E3F2FD; border-left-color: #1565C0; }
  .entry-card.call-missed   { background: #FFEBEE; border-left-color: #C62828; }
  .entry-card.call-voicemail{ background: #FFF3E0; border-left-color: #E65100; }

  /* FORMSPREE */
  .entry-card.formspree { background: #FFF8F5; border-left-color: #E65100; }

  /* LSA */
  .entry-card.lsa { background: #FAF5FF; border-left-color: #6A1B9A; }

  /* ENTRY ROW */
  .entry-row { margin-bottom: 6px; line-height: 1.5; }
  .entry-row:last-child { margin-bottom: 0; }
  .source-badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 10px; margin-right: 6px; letter-spacing: 0.4px; text-transform: uppercase;
  }
  .sb-call   { background: #1565C0; color: #fff; }
  .sb-form   { background: #E65100; color: #fff; }
  .sb-lsa    { background: #6A1B9A; color: #fff; }

  .status-badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 10px; margin-right: 4px;
  }
  .st-booked   { background: #2D6A4F; color: #fff; }
  .st-answered { background: #1565C0; color: #fff; }
  .st-missed   { background: #C62828; color: #fff; }
  .st-voicemail{ background: #E65100; color: #fff; }

  .tag-badge {
    display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px;
    background: #e8f5e9; color: #2D6A4F; margin-right: 4px; font-weight: 600;
  }

  .caller-name  { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .caller-phone { font-size: 14px; color: #1565C0; text-decoration: none; }
  .caller-phone:hover { text-decoration: underline; }
  .duration-txt { font-size: 13px; color: #666; }
  .detail-line  { font-size: 13px; color: #444; }
  .summary-text { font-size: 13px; color: #555; font-style: italic; line-height: 1.5; }
  .voicemail-text{ font-size: 13px; color: #444; line-height: 1.5; }
  .date-small   { font-size: 11px; color: #999; }

  .service-pill {
    display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px;
    border-radius: 12px; background: #e8f5e9; color: #1B4332;
  }

  .message-text { font-size: 13px; color: #555; line-height: 1.5; }
  .email-link   { color: #1565C0; text-decoration: none; }
  .email-link:hover { text-decoration: underline; }

  .sep { margin: 0 6px; color: #ccc; }

  /* FOOTER */
  .footer { text-align: center; padding: 24px; font-size: 12px; color: #999; }

  .hidden { display: none !important; }
</style>
</head>

<script>
function fmtDuration(secs) {
  if (!secs) return '0s';
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function fmtPhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  if (digits.length === 10) return `${digits.slice(0,3)}-${digits.slice(3,6)}-${digits.slice(6)}`;
  return p;
}

function getCallType(call) {
  const tags = (call.tags || []).map(t => t.toLowerCase());
  if (tags.some(t => t.includes('booked'))) return 'call-booked';
  if (call.status === 'answered') return 'call-answered';
  if (call.status === 'missed')   return 'call-missed';
  if (call.status === 'voicemail') return 'call-voicemail';
  return 'call-answered';
}

function getStatusBadge(call) {
  const type = getCallType(call);
  const labels = {
    'call-booked':    ['st-booked',   '✅ Confirmado'],
    'call-answered':  ['st-answered', '✔ Contestada'],
    'call-missed':    ['st-missed',   '✗ Perdida'],
    'call-voicemail': ['st-voicemail','🎤 Buzón'],
  };
  const [cls, text] = labels[type] || ['st-answered','Contestada'];
  return `<span class="status-badge ${cls}">${text}</span>`;
}

function renderAction(action) {
  return `<div class="entry-card action" data-type="action">
    <div class="action-icon">🚨</div>
    <div class="action-text">${action.text}</div>
  </div>`;
}

function renderCall(call) {
  const type = getCallType(call);
  const phone = call.caller_phone || '';
  const fmtPhone2 = fmtPhone(phone);
  const tags = (call.tags || []).filter(t => !t.toLowerCase().includes('booked'));
  const tagHtml = tags.map(t => `<span class="tag-badge">${t}</span>`).join('');
  const bookedTag = (call.tags||[]).some(t=>t.toLowerCase().includes('booked'))
    ? `<span class="tag-badge" style="background:#c8e6c9;color:#1B4332;">Schedule Booked</span>` : '';

  return `<div class="entry-card ${type}" data-type="${type}">
    <div class="entry-row">
      <span class="source-badge sb-call">📞 CallRail</span>
      ${getStatusBadge(call)}
      ${bookedTag}${tagHtml}
    </div>
    <div class="entry-row">
      <span class="caller-name">${call.caller_name || 'Desconocido'}</span>
      <span class="sep">·</span>
      <a class="caller-phone" href="tel:${phone}">${fmtPhone2 || phone}</a>
      <span class="sep">·</span>
      <span class="duration-txt">⏱ ${fmtDuration(call.duration_seconds)}</span>
    </div>
    ${call.address ? `<div class="entry-row detail-line">📍 ${call.address}${call.city ? ', ' + call.city : ''}</div>` : ''}
    ${call.service_requested ? `<div class="entry-row"><span class="service-pill">🔧 ${call.service_requested}</span></div>` : ''}
    ${call.call_summary ? `<div class="entry-row summary-text">"${call.call_summary}"</div>` : ''}
    ${call.voicemail_transcript ? `<div class="entry-row voicemail-text">🎤 <strong>Buzón de voz:</strong> ${call.voicemail_transcript}</div>` : ''}
    <div class="entry-row date-small">${call.call_date || ''}</div>
  </div>`;
}

function renderFormspree(form) {
  const phone = fmtPhone(form.phone);
  return `<div class="entry-card formspree" data-type="formspree">
    <div class="entry-row">
      <span class="source-badge sb-form">🌐 Formspree</span>
    </div>
    <div class="entry-row">
      <span class="caller-name">${form.name || 'Sin nombre'}</span>
      ${form.email ? `<span class="sep">·</span><a class="email-link" href="mailto:${form.email}">${form.email}</a>` : ''}
      ${form.phone ? `<span class="sep">·</span><a class="caller-phone" href="tel:${form.phone}">${phone}</a>` : ''}
    </div>
    ${form.address ? `<div class="entry-row detail-line">📍 ${form.address}</div>` : ''}
    ${form.service ? `<div class="entry-row"><span class="service-pill">🔧 ${form.service}</span></div>` : ''}
    ${form.message ? `<div class="entry-row message-text">${form.message}</div>` : ''}
    <div class="entry-row date-small">${form.time || ''}</div>
  </div>`;
}

function renderLSA(lsa) {
  return `<div class="entry-card lsa" data-type="lsa">
    <div class="entry-row">
      <span class="source-badge sb-lsa">📍 Google Local Services</span>
    </div>
    ${(lsa.customer_name || lsa.customer_phone) ? `<div class="entry-row">
      ${lsa.customer_name ? `<span class="caller-name">${lsa.customer_name}</span>` : ''}
      ${lsa.customer_phone ? `<span class="sep">·</span><a class="caller-phone" href="tel:${lsa.customer_phone}">${fmtPhone(lsa.customer_phone)}</a>` : ''}
    </div>` : ''}
    ${lsa.service_requested ? `<div class="entry-row"><span class="service-pill">🔧 ${lsa.service_requested}</span></div>` : ''}
    ${lsa.notes ? `<div class="entry-row detail-line">${lsa.notes}</div>` : ''}
    <div class="entry-row date-small">${lsa.lead_time || ''}${lsa.lead_id ? ' · ID: ' + lsa.lead_id : ''}</div>
  </div>`;
}

function buildDashboard() {
  const container = document.getElementById('main-content');
  let html = '';

  DATA.forEach(day => {
    const callCount = (day.callrail || []).length;
    const formCount = (day.formspree || []).length;
    const lsaCount  = (day.lsa || []).length;

    let entriesHtml = '';

    (day.actions || []).forEach(a => { entriesHtml += renderAction(a); });
    (day.callrail || []).forEach(c => { entriesHtml += renderCall(c); });
    (day.formspree || []).forEach(f => { entriesHtml += renderFormspree(f); });
    (day.lsa || []).forEach(l => { entriesHtml += renderLSA(l); });

    html += `<div class="day-card" data-date="${day.date}">
      <div class="day-header">
        <div class="day-date">${day.display}</div>
        <div class="day-badges">
          ${callCount > 0 ? `<span class="mini-badge badge-call">📞 ${callCount}</span>` : ''}
          ${formCount > 0 ? `<span class="mini-badge badge-form">🌐 ${formCount}</span>` : ''}
          ${lsaCount  > 0 ? `<span class="mini-badge badge-lsa">📍 ${lsaCount}</span>` : ''}
        </div>
      </div>
      <div class="day-entries">${entriesHtml}</div>
    </div>`;
  });

  container.innerHTML = html;
}

function filterEntries(type) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.day-card').forEach(card => {
    let visibleCount = 0;
    card.querySelectorAll('[data-type]').forEach(entry => {
      let show = false;
      if (type === 'all') {
        show = true;
      } else if (type === 'call') {
        show = entry.dataset.type.startsWith('call-');
      } else {
        show = entry.dataset.type === type;
      }
      entry.classList.toggle('hidden', !show);
      if (show) visibleCount++;
    });
    card.classList.toggle('hidden', visibleCount === 0);
  });
}

buildDashboard();
</script>
