<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mockingbird Tree Service — Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f0; color: #333; }

.header { background: #1B4332; color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 1.6rem; font-weight: bold; letter-spacing: 0.5px; }
.header .subtitle { font-size: 1rem; opacity: 0.85; margin-top: 4px; }
.header .updated { font-size: 0.75rem; opacity: 0.65; margin-top: 4px; }

.stats-row { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 12px; padding: 16px; background: #fff; border-bottom: 1px solid #ddd; -webkit-overflow-scrolling: touch; }
.stat-card { flex: 0 0 auto; min-width: 140px; background: #f9f9f9; border-radius: 10px; padding: 14px 16px; text-align: center; border: 1px solid #e0e0e0; }
.stat-icon { font-size: 1.4rem; }
.stat-value { font-size: 2rem; font-weight: bold; color: #1B4332; line-height: 1.2; margin-top: 4px; }
.stat-value.urgent { color: #C62828; }
.stat-label { font-size: 0.68rem; color: #777; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

.filter-bar { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #ddd; padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-btn { flex: 0 0 auto; border: none; border-radius: 20px; padding: 7px 14px; font-size: 0.82rem; cursor: pointer; background: #f0f0f0; color: #333; transition: background 0.2s, color 0.2s; white-space: nowrap; }
.filter-btn.active { background: #2D6A4F; color: white; }
.filter-btn:hover:not(.active) { background: #ddd; }

.content { padding: 16px; max-width: 800px; margin: 0 auto; }

.day-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
.day-card-header { background: #f5f5f5; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e0e0e0; }
.day-card-date { font-weight: bold; color: #1B4332; font-size: 1rem; flex: 1; }
.day-badge { background: #2D6A4F; color: white; border-radius: 12px; padding: 2px 10px; font-size: 0.72rem; white-space: nowrap; }
.day-card-body { padding: 6px 0 6px 0; }

.entry { padding: 11px 14px; border-left: 4px solid #ccc; margin: 8px 10px; border-radius: 6px; line-height: 1.5; }
.entry.action { background: #FFEBEE; border-left-color: #C62828; }
.entry.call-booked { border-left-color: #2D6A4F; background: #f6fbf8; }
.entry.call-answered { border-left-color: #1565C0; background: #f4f8ff; }
.entry.call-missed { border-left-color: #C62828; background: #fff8f8; }
.entry.formspree { border-left-color: #E65100; background: #fff9f6; }
.entry.lsa { border-left-color: #6A1B9A; background: #fdf4ff; }

.entry-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.entry-icon { font-size: 1.1rem; }
.entry-name { font-weight: bold; font-size: 0.95rem; }
.entry-phone a { color: #2D6A4F; text-decoration: none; font-size: 0.9rem; }
.entry-phone a:hover { text-decoration: underline; }
.entry-meta { font-size: 0.8rem; color: #666; margin-top: 5px; }
.entry-summary { font-style: italic; font-size: 0.8rem; color: #666; margin-top: 5px; }
.entry-message { font-size: 0.82rem; color: #555; margin-top: 5px; }
.action-text { font-weight: bold; font-size: 0.9rem; color: #B71C1C; }

.badge { display: inline-block; border-radius: 12px; padding: 1px 8px; font-size: 0.7rem; font-weight: bold; vertical-align: middle; }
.badge-green { background: #E8F5E9; color: #2D6A4F; }
.badge-blue { background: #E3F2FD; color: #1565C0; }
.badge-red { background: #FFEBEE; color: #C62828; }
.badge-orange { background: #FBE9E7; color: #E65100; }
.badge-purple { background: #F3E5F5; color: #6A1B9A; }

.footer { text-align: center; color: #aaa; font-size: 0.75rem; padding: 24px 16px; }

@media (max-width: 480px) {
  .header h1 { font-size: 1.2rem; }
  .stat-value { font-size: 1.6rem; }
  .entry { margin: 8px 6px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🌳 THE MOCKINGBIRD TREE SERVICE</h1>
  <div class="subtitle">Lead Dashboard</div>
  <div class="updated">Updated: 2026-05-27</div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">📋 Todos</button>
  <button class="filter-btn" data-filter="call" onclick="setFilter('call')">📞 Llamadas</button>
  <button class="filter-btn" data-filter="formspree" onclick="setFilter('formspree')">🌐 Web Forms</button>
  <button class="filter-btn" data-filter="lsa" onclick="setFilter('lsa')">📍 LSA</button>
  <button class="filter-btn" data-filter="action" onclick="setFilter('action')">🚨 Pendientes</button>
</div>

<div class="content" id="content"></div>

<div class="footer">The Mockingbird Tree Service — Dashboard automático</div>

<script>
const DATA = [
  {
    "date": "2026-05-27",
    "display": "Miércoles 27 de Mayo 2026",
    "callrail": [
      {
        "caller_name": "Whitley E.",
        "caller_phone": "615-373-4924",
        "duration_seconds": 231,
        "status": "answered",
        "tag": "Schedule booked",
        "summary": "Rick Whitley called to confirm a tree removal job at 314 Hayeswood Drive for $2800 that was previously estimated. He had concerns about whether the company uses a bucket truck (confirming they do) and whether electrical wires near the front tree would be a problem (agent confirmed they can safely handle it). The agent agreed to schedule the work for Monday, weather permitting, and committed to calling before arrival.",
        "city": "Nashville, TN"
      }
    ],
    "formspree": [
      {
        "name": "Tim Preston",
        "phone": "6158120123",
        "service": "Tree Removal",
        "message": "Hello, I am looking to get a large (30ft or so) evergreen tree removed, and a stump ground. Thanks",
        "time": "2026-05-26T21:01:21Z"
      }
    ],
    "lsa": [
      {
        "type": "new_lead",
        "time": "4:39 PM on 05/26/2026"
      }
    ],
    "actions": [
      {
        "priority": "urgent",
        "text": "Lead web: Tim Preston quiere Tree Removal — llamar al 6158120123"
      }
    ]
  }
];

const STATS = {
  total_calls_30d: 1,
  total_web_30d: 1,
  total_booked_30d: 1,
  pending_actions: 1
};

// Render stats
document.getElementById('stats-row').innerHTML = `
  <div class="stat-card">
    <div class="stat-icon">📞</div>
    <div class="stat-value">${STATS.total_calls_30d}</div>
    <div class="stat-label">Llamadas / 30 d&iacute;as</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🌐</div>
    <div class="stat-value">${STATS.total_web_30d}</div>
    <div class="stat-label">Leads Web / 30 d&iacute;as</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">✅</div>
    <div class="stat-value">${STATS.total_booked_30d}</div>
    <div class="stat-label">Trabajos Confirmados</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🚨</div>
    <div class="stat-value ${STATS.pending_actions > 0 ? 'urgent' : ''}">${STATS.pending_actions}</div>
    <div class="stat-label">Acciones Hoy</div>
  </div>
`;

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtDuration(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return m > 0 ? `${m}m ${r}s` : `${r}s`;
}

function fmtPhone(p) {
  const d = String(p || '').replace(/\D/g,'');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
}

function getCallType(call) {
  const tag = (call.tag || '').toLowerCase();
  if (tag.includes('booked') && call.status === 'answered') return 'call-booked';
  if (call.status === 'answered') return 'call-answered';
  return 'call-missed';
}

function renderCall(call) {
  const ct = getCallType(call);
  const icon = ct === 'call-booked' ? '✅' : ct === 'call-answered' ? '📞' : '❌';
  const bc = ct === 'call-booked' ? 'badge-green' : ct === 'call-answered' ? 'badge-blue' : 'badge-red';
  const sl = ct === 'call-booked' ? 'Confirmado' : ct === 'call-answered' ? 'Contestado' : 'Perdido';
  const phone = esc(call.caller_phone || '');
  const phoneClean = (call.caller_phone || '').replace(/\D/g,'');
  const summary = (call.summary || '').substring(0, 150) + ((call.summary || '').length > 150 ? '…' : '');
  return `<div class="entry ${ct}" data-type="${ct}">
    <div class="entry-row">
      <span class="entry-icon">${icon}</span>
      <span class="entry-name">${esc(call.caller_name)}</span>
      <span class="entry-phone"><a href="tel:${phoneClean}">${phone}</a></span>
      <span class="badge ${bc}">${sl}</span>
      ${call.tag ? `<span class="badge ${bc}">${esc(call.tag)}</span>` : ''}
    </div>
    <div class="entry-meta">${esc(call.city || '')} &nbsp;·&nbsp; ${fmtDuration(call.duration_seconds || 0)}</div>
    ${summary ? `<div class="entry-summary">${esc(summary)}</div>` : ''}
  </div>`;
}

function renderFormspree(f) {
  const phoneClean = (f.phone || '').replace(/\D/g,'');
  return `<div class="entry formspree" data-type="formspree">
    <div class="entry-row">
      <span class="entry-icon">🌐</span>
      <span class="entry-name">${esc(f.name)}</span>
      <span class="entry-phone"><a href="tel:${phoneClean}">${esc(fmtPhone(f.phone))}</a></span>
      <span class="badge badge-orange">${esc(f.service || '')}</span>
    </div>
    <div class="entry-message">${esc(f.message || '')}</div>
  </div>`;
}

function renderLSA(l) {
  const label = l.type === 'new_lead' ? 'New Lead' : 'Notification';
  return `<div class="entry lsa" data-type="lsa">
    <div class="entry-row">
      <span class="entry-icon">📍</span>
      <span class="badge badge-purple">${label}</span>
      <span style="font-size:0.82rem;color:#666;">${esc(l.time || '')}</span>
    </div>
  </div>`;
}

function renderAction(a) {
  return `<div class="entry action" data-type="action">
    <div class="entry-row">
      <span class="entry-icon">🚨</span>
      <span class="action-text">${esc(a.text)}</span>
    </div>
  </div>`;
}

// Build day cards
let html = '';
for (const day of DATA) {
  const total = (day.actions||[]).length + (day.callrail||[]).length + (day.formspree||[]).length + (day.lsa||[]).length;
  let body = '';
  for (const a of (day.actions||[])) body += renderAction(a);
  for (const c of (day.callrail||[])) body += renderCall(c);
  for (const f of (day.formspree||[])) body += renderFormspree(f);
  for (const l of (day.lsa||[])) body += renderLSA(l);

  html += `<div class="day-card" id="day-${esc(day.date)}">
    <div class="day-card-header">
      <span class="day-card-date">${esc(day.display)}</span>
      <span class="day-badge" id="badge-${esc(day.date)}">${total} entradas</span>
    </div>
    <div class="day-card-body">${body}</div>
  </div>`;
}
document.getElementById('content').innerHTML = html;

// Filter
function setFilter(filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  document.querySelectorAll('.day-card').forEach(card => {
    const entries = card.querySelectorAll('.entry');
    let vis = 0;
    entries.forEach(e => {
      const t = e.dataset.type;
      let show = false;
      if (filter === 'all') show = true;
      else if (filter === 'call') show = ['call-booked','call-answered','call-missed'].includes(t);
      else if (filter === 'formspree') show = t === 'formspree';
      else if (filter === 'lsa') show = t === 'lsa';
      else if (filter === 'action') show = t === 'action';
      e.style.display = show ? '' : 'none';
      if (show) vis++;
    });
    card.style.display = vis === 0 ? 'none' : '';
    const badge = card.querySelector('.day-badge');
    if (badge) badge.textContent = vis + ' entradas';
  });
}
</script>
</body>
</html>
